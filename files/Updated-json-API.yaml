  /orders/eta:
    get:
      tags:
      - Orders
      summary: Get Order ETA
      description: >
        Returns the estimated time of arrival (ETA) for an order.

        **ETA is available only when:**
        - Order status is "Scheduled" or "In Transit"

      security:
        - Auth: []
      parameters:
        - name: number
          in: query
          description: Order number
          required: true
          schema:
            type: string
            example: '106092'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtaSuccess'
        400:
          description: Bad Request
