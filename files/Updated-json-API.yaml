  /drivers/add:
    post:
      tags:
        - Drivers
      summary: Add Drivers
      description: |
        Import or update drivers with optional profile image upload.

        **Image Upload Options:**
        - `driver_image_url`: URL to download image from (HTTP/HTTPS)
        - `driver_image_base64`: Raw Base64-encoded image data

        **Image Validation Rules:**
        - Supported formats: JPG, JPEG, PNG, GIF
        - Maximum file size: 1 MB
        - If both URL and Base64 are provided, URL is attempted first; Base64 is used as fallback if URL fails

        **Base64 Image Fields:**
        - `driver_image_base64`: Raw Base64 string (NOT data URI format)
        - `driver_image_content_type`: **REQUIRED** when using Base64 - MIME type (image/jpeg, image/png, image/gif)
        - `driver_image_filename`: Optional - defaults to driver name if not provided (e.g., "John Doe.jpg")

      security:
        - Auth: []
      requestBody:
        content:
          application/json:
            schema:
              required:
              - drivers
              properties:
                drivers:
                  type: object
                  properties:
                    driver:
                      type: array
                      items:
                        $ref: '#/components/schemas/ImportDriver'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddDriverSuccess'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DriverNumberMissingError'
                  - $ref: '#/components/schemas/DriverFirstNameMissingError'
                  - $ref: '#/components/schemas/DriverLastNameMissingError'
                  - $ref: '#/components/schemas/DriverFirstNameTooLongError'
                  - $ref: '#/components/schemas/DriverLastNameTooLongError'
                  - $ref: '#/components/schemas/DriverNotFoundError'
                  - $ref: '#/components/schemas/DriverParsingError'
                  - $ref: '#/components/schemas/DriverImageInvalidUrlError'
                  - $ref: '#/components/schemas/DriverImageNotReachableError'
                  - $ref: '#/components/schemas/DriverImageInvalidBase64Error'
                  - $ref: '#/components/schemas/DriverImageMissingContentTypeError'
                  - $ref: '#/components/schemas/DriverImageSizeExceededError'
                  - $ref: '#/components/schemas/DriverImageUnsupportedFormatError'
                  - $ref: '#/components/schemas/DriverImageCorruptError'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedInvalidToken'
        403:
          description: Unauthorized Access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedAccessError'

