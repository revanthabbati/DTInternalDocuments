              schema:
                oneOf:
                  - $ref: '#/components/schemas/MissingParametersResponse'
                  - $ref: '#/components/schemas/OrderNotFoundError'
                  - $ref: '#/components/schemas/CustomerPickupNotEnabledError'
                  - $ref: '#/components/schemas/OrderNotInScheduledStatusError'
                  - $ref: '#/components/schemas/UnsupportedServiceTypeError'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedAccessWithNote'

  /rs_api/v2/reservation_choices:
    get:
      tags:
        - Reservations
      summary: Get Reservation Choices
      description: >
        Retrieves available time windows for creating a reservation.
        This endpoint returns available reservation time slots based on the provided parameters.

        The response includes an array of `reservation_choices`, each containing a Base64-encoded
        `time_window_id` that must be passed to the Create Reservation endpoint to commit the booking.

        Pagination is supported via `offset`.
        If `max_options` is provided in the request, it overrides the business setting
        `reservation_max_no_of_dates_offered`; otherwise the business setting is used.
        Per-page size is controlled by business setting `reservation_max_no_of_dates_offered_per_page`.
        The `can_display_more` field in the response indicates whether additional pages are available.

        Example when `ignore_capacity=true`:
        `{"reservation_choices":[{"time_window":"08:30 AM to 10:30 AM","date":"2025-05-20","time_window_id":"...","capacity_filled_percentage":82.00}],"message":"Success","can_display_more":true}`
      security:
        - RsApiAuth: []
      parameters:
        - name: code
          in: query
          description: Business code for authentication. Can also be sent via the `Code` HTTP header.
          required: true
          schema:
            type: string
        - name: api_key
          in: query
          description: API key for authentication. Can also be sent via the `Api-Key` HTTP header.
          required: true
          schema:
            type: string
        - name: zip
          in: query
          description: Zip code (required)
          required: true
          schema:
            type: string
            example: '95064 or 1* or 12424,12456'
        - name: address_line1
          in: query
          description: Address line 1
          required: false
          schema:
            type: string
            example: '1156 high street'
        - name: address_line2
          in: query
          description: Address line 2
          required: false
          schema:
            type: string
        - name: city
          in: query
          description: City
          required: false
          schema:
            type: string
            example: 'Santa Cruz'
        - name: state
          in: query
          description: State
          required: false
          schema:
            type: string
            example: 'CA'
        - name: account
          in: query
          description: Account name (used if accounts are enabled)
          required: false
          schema:
            type: string
            example: 'Acc1'
        - name: service_type
          in: query
          description: Service type name
          required: false
          schema:
            type: string
            example: 'Delivery'
        - name: service_time
          in: query
          description: Service time in minutes
          required: false
          schema:
            type: integer
            example: 30
        - name: skill_level
          in: query
          description: Skill level
          required: false
          schema:
            type: integer
            example: 1
        - name: pieces
          in: query
          description: Number of pieces
          required: false
          schema:
            type: integer
            example: 5
        - name: cubes
          in: query
          description: Cube volume (must be greater than 0 if provided)
          required: false
          schema:
            type: number
            format: float
            example: 100.5
        - name: reservation_number
          in: query
          description: Existing reservation number (for rescheduling)
          required: false
          schema:
            type: string
            example: '1234567890'
        - name: ready_to_schedule_date
          in: query
          description: Ready to schedule date (YYYY-MM-DD format)
          required: false
          schema:
            type: string
            example: '2024-08-03'
        - name: max_options
          in: query
          description: Maximum number of date options to return
          required: false
          schema:
            type: integer
            example: 10
        - name: max_days
          in: query
          description: Maximum number of days to look ahead
          required: false
          schema:
            type: integer
            example: 30
        - name: offset
          in: query
          description: Offset for pagination
          required: false
          schema:
            type: integer
            example: 0
        - name: ignore_offset
          in: query
          description: Whether to ignore offset (for regular reservations)
          required: false
          schema:
            type: string
            enum: ['true', 'false']
            example: 'false'
        - name: ignore_capacity
          in: query
          description: >
            When true, includes full slots and computes capacity_filled_percentage for each reservation choice.
            When false or omitted, existing behavior is preserved (full slots may be omitted and no capacity metrics are returned).
          required: false
          schema:
            type: string
            enum: ['true', 'false']
            example: 'false'
        - name: no_of_resources
          in: query
          description: Number of resources (for appointment reservations, max limit applies)
          required: false
          schema:
            type: integer
            example: 1
        - name: generate_reservation_number
          in: query
          description: Whether to generate a new reservation number
          required: false
          schema:
            type: string
            enum: ['true', 'false']
            example: 'true'
        - name: send_address_resolution
          in: query
          description: Whether to include address resolution information
          required: false
          schema:
            type: string
            enum: ['true', 'false']
            example: 'true'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationChoicesSuccess'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MissingMandatoryFieldsError'
                  - $ref: '#/components/schemas/InvalidCubesError'
                  - $ref: '#/components/schemas/InvalidAccountError'
                  - $ref: '#/components/schemas/InvalidServiceTypeError'
                  - $ref: '#/components/schemas/InvalidReadyToScheduleDateError'
                  - $ref: '#/components/schemas/ReservationNotEligibleError'
                  - $ref: '#/components/schemas/ResourcesExceedingMaxLimitError'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCodeNotFoundError'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedAccessError'

  /rs_api/v2/create_reservation:
    post:
      tags:
        - Reservations
      summary: Commit Reservation
      description: >
        Creates a new reservation or updates an existing reservation with the selected time window.
        Supports both regular reservations and appointment-based reservations.

        The `time_window_id` must be a valid Base64-encoded value obtained from the Get Reservation Choices endpoint.

        If a `reservation_number` (or `order_number`) that already exists is provided, the system will
        attempt to reschedule the existing reservation to the new time window, subject to eligibility checks
        (order status, route status, rescheduling cut-off dates).

        For appointment-based reservations with multiple resources, the system will create separate
        reservation entries for each resource (e.g., `RES-1`, `RES-1-2`).

        **Additional Fields Warning**: If additional field keys are provided in the request that are not configured
        for the business in Admin > Additional Fields > Reservations Tab, the reservation will still be created successfully,
        but the response will include a `warning` field listing all skipped field keys.
      security:
        - RsApiAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservationSuccess'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MissingMandatoryFieldsError'
                  - $ref: '#/components/schemas/InvalidCubesError'
                  - $ref: '#/components/schemas/InvalidAccountError'
                  - $ref: '#/components/schemas/InvalidTimeWindowError'
                  - $ref: '#/components/schemas/CapacityUnavailableError'
                  - $ref: '#/components/schemas/ReservationNotEligibleForReschedulingError'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCodeNotFoundError'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedAccessError'
        422:
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationError'

  /rs_api/v2/{reservation_number}/update_reservation:
    put:
      tags:
        - Reservations
      summary: Update Reservation
      description: >
        Updates additional fields for an existing reservation.
        This endpoint is used to add or update custom/additional fields on a reservation
        that has already been committed via the Create Reservation endpoint.

        The reservation is looked up by `reservation_number` in the URL path.
        Returns 404 if the reservation is not found.

        **Additional Fields Warning**: If additional field keys are provided in the request that are not configured
        for the business in Admin > Additional Fields > Reservations Tab, the reservation will still be updated successfully,
        but the response will include a `warning` field listing all skipped field keys.
      security:
        - RsApiAuth: []
      parameters:
        - name: reservation_number
          in: path
          description: The reservation number to update
          required: true
          schema:
            type: string
            example: '1234567890'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservationRequest'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateReservationSuccess'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationError'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCodeNotFoundError'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedAccessError'
        404:
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationNotFoundError'

  /rs_api/v2/release_reservation:
    get:
      tags:
        - Reservations
      summary: Release Reservation (GET)
      description: >
        Releases a reservation, freeing up the capacity for that time window.
        Can also unschedule an associated order if eligible.

        Either `reservation_number` or `order_number` must be provided.
        If `order_number` is provided (without `reservation_number`), the system will look up
        the associated reservation order from the service order.
      security:
        - RsApiAuth: []
      parameters:
        - name: code
          in: query
          description: Business code for authentication. Can also be sent via the `Code` HTTP header.
          required: true
          schema:
            type: string
        - name: api_key
          in: query
          description: API key for authentication. Can also be sent via the `Api-Key` HTTP header.
          required: true
          schema:
            type: string
        - name: reservation_number
          in: query
          description: Reservation number (required if order_number not provided)
          required: false
          schema:
            type: string
            example: '1234567890'
        - name: order_number
          in: query
          description: Order number (required if reservation_number not provided)
          required: false
          schema:
            type: string
            example: '100001'
        - name: unschedule
          in: query
          description: >
            Whether to unschedule the associated order if it is in Scheduled status.
            When true, the order will be unscheduled and its status reset to Ready to Reschedule.
          required: false
          schema:
            type: string
            enum: ['true', 'false']
            example: 'true'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseReservationSuccess'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MissingMandatoryFieldsError'
                  - $ref: '#/components/schemas/ReservationNotEligibleForReleaseError'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCodeNotFoundError'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedAccessError'
        422:
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationError'
    post:
      tags:
        - Reservations
      summary: Release Reservation (POST)
      description: >
        Releases a reservation, freeing up the capacity for that time window.
        Can also unschedule an associated order if eligible.

        Either `reservation_number` or `order_number` must be provided.
        If `order_number` is provided (without `reservation_number`), the system will look up
        the associated reservation order from the service order.

        This endpoint supports both GET and POST methods. When using POST, parameters
        can be sent in the request body instead of the query string.
      security:
        - RsApiAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseReservationRequest'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseReservationSuccess'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MissingMandatoryFieldsError'
                  - $ref: '#/components/schemas/ReservationNotEligibleForReleaseError'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCodeNotFoundError'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedAccessError'
        422:
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationError'

components:
  requestBodies:
    OauthTokenRequest:
      content:
        application/x-www-form-urlencoded:
          schema:
            required:
            - grant_type
            properties:
              grant_type:
                type: string
                description: Grant Type (only client_credentials supported)
                example: client_credentials
    
    ManifestRequest:
      content:
        application/json:
          schema:
            required:
            - account_name
            - date
            properties:
              account_name:
                type: string
                description: Account Name (required if accounts are enabled)
                example: 'Acc1'
              date:
                type: string
                description: Date (mm/dd/yyyy)
                example: '08/03/2020'
              # service_unit_name:
              #   type: string
              #   description: Service Unit
              #   example: 'SU1'
    
    ExportOrderRequest:
      content:
        application/json:
          schema:
            required:
              - oneOf
            properties:
              oneOf:
                properties:
                  schedule_date:
                    type: string
                    description: Schedule Date (mm/dd/yyyy)
                    example: '08/03/2020'
                  request_date:
                    type: string
                    description: Request Date (mm/dd/yyyy)
                    example: '08/03/2020'
              start_time:
                type: string
                description: Start Time
                example: '10:00 AM'
              end_time:
                type: string
                description: End Time
                example: '11:00 AM'
              order_number:
                type: string
                description: Service Order Number
                example: '100001'
              account_name:
                type: string
                description: Account Name
                example: 'Acc1'
              status:
                type: string
                description: Status
                example: 'Finished'

    MessagingRequest:
      content:
        application/json:
          schema:
            properties:
              message:
                type: string
                description: The message content to send
                example: 'Your delivery route has been updated. Please check for new instructions.'
              driver:
                type: string
                description: The driver identifier
                example: 'driver_001'
              service_unit_number:
                type: string
                description: The service unit number
                example: 'SU 123'

    StatusRequest:
      content:
        application/json:
          schema:
            properties:
              date:
                type: string
                description: Request Date (mm/dd/yyyy)
                example: '08/03/2020'
              start_time:
                type: string
                description: Start Date (mm/dd/yyyy)
                example: '08/03/2020'
              end_time:
                type: string
                description: End Date
                example: '08/04/2020'
              order_number:
                type: string
                description: Service Order Number
                example: '100001'
              account:
                type: string
                description: Account Name
                example: 'Acc1'
              status:
                type: string
                description: Status
                example: 'Finished'
              customer_id:
                type: string
                description: Customer ID
                example: '123'
              phone:
                type: string
                description: Phone number
                example: '1234567890'
              email:
                type: string
                description: Email
                example: 'test@abc.com'
              schedule_date:
                type: string
                description: Schedule date (mm/dd/yyyy)
                example: '08/03/2020'
              service_unit:
                type: string
                description: Service Unit
                example: 'SU1'
              service_type:
                type: string
                description: Service type
                example: 'Delivery'
            anyOf:
              - required:
                  - date
              - required:
                  - order_number
              - required:
                  - date
                  - order_number
    TruckImportRequestBody:
      description: Truck data to be imported into the system
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TruckImportRequest'

    NotifyRequest:
      content:
        application/json:
          schema:
            properties:
              template_name:
                type: string
                description: Template name
                example: 'unable_to_start'
              service_order_id:
                type: string
                description: Service Order Number
                example: '100001'
            required:
              - template_name
              - service_order_id

    UpdateOrderStatusRequest:
      content:
        application/json:
          schema:
            properties:
              order_number:
                type: string
                description: Order Number
                example: '100001'
            required:
              - order_number

  schemas:
    OauthToken:
      type: object
      properties:
        access_token:
          type: string
          example: '0f23feedca76a070dd8d49d9d524b67fa3fe5089'
        access_token_expires_at:
          type: string
          example: '2020-08-03T13:17:05.678Z'
    OauthTokenError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        status:
          type: integer
          example: 400
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Invalid Client Credentials"
        name:
          type: string
          example: "invalid_request"

    EtaSuccess:
      type: object
      properties:
        status:
          type: integer
          example: 200
        eta:
          type: string
          description: ETA datetime in order resource time zone
          example: '2026-02-23 16:30:00 -0800'
        computed_at:
          type: string
          description: Timestamp when the ETA was computed
          example: '2026-02-23 14:15:00 -0800'
        version:
          type: string
          example: 'v123'

    EtaUnavailable:
      type: object
      properties:
        status:
          type: integer
          example: 400
        note:
          type: string
          example: 'ETA unavailable'
        version:
          type: string
          example: 'v123'

    EtaOrderNumberRequired:
      type: object
      properties:
        status:
          type: integer
          example: 400
        note:
          type: string
          example: 'Order number is required'
        version:
          type: string
          example: 'v123'

    EtaOrderNotFound:
      type: object
      properties:
        status:
          type: integer
          example: 404
        note:
          type: string
          example: 'Order not found'
        version:
          type: string
          example: 'v123'

    DeleteOrderSuccess:
      type: object
      properties:
        status:
          type: integer
          example: 200
        success:
          type: boolean
          default: true
          example: true
        note:
          type: string
          example: 'Orders deleted successfully'
    DeleteOrderError:
      type: object
      properties:
        status:
          type: integer
          example: 400
        success:
          type: boolean
          default: false
          example: false
        note:
          type: string
          example: 'Required parameters missing'

    AddOrderSuccess:
      type: object
      properties:
        data:
          type: object
          properties:
            failed:
              type: integer
              example: 0
            successful:
              type: integer
              example: 1
            failed_orders:
              type: array
              items:
                type: string
              example: []
        status:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        note:
          type: string
          example: "Import Completed"
    AddOrderError:
      type: object
      properties:
        status:
          type: integer
          example: 400
        success:
          type: boolean
          default: false
          example: false
        note:
          type: string
          example: Required parameters missing

    ServiceOrder:
      type: object
      properties:
        order_number:
          type: string
          example: '100001'
        display_order_number:
          type: string
          example: '100001'
        status:
          type: string
          example: New
        service_type:
          type: string
          example: Delivery
        description:
          type: string
          example: This is a sample order
        account_name:
          type: string
          example: Acc1
        confirmation_status:
          type: string
          example: Confirmed
        text_confirmation_status:
          type: string
          example: Delivered
        stop_number:
          type: integer
          example: 1
        route_locked:
          type: boolean
          example: false
        delivery_date:
