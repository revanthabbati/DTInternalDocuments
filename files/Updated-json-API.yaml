openapi: 3.0.1
info:
  title: DispatchTrack API
  description: >
    # Authentication
    
    The authentication for this API is done via Oauth2 Access Token:

    - **GetTokenAuth**  

    You can find the client ID and secret in your application's Admin - Oauth2 Settings tab.  
    
    These are then passed via Basic Auth in the request to server's /oauth2/token endpoint to get the access token.  

    - **Auth**  

    With the Oauth2 Access Token received from /oauth2/token request, API requests for remaining API endpoints can be made.  

    It has to be sent as an Authorization Bearer header in the request.  

    If an invalid or expired access token is used, API will send back a 401 status.  

  version: ''
  x-logo:
    url: "https://dmlzklevomxxt.cloudfront.net/web/images/V2/logo/dt-logo-2.svg"
    backgroundColor: "#132045"
    altText: "DispatchTrack API"
servers:
- url: https://dtdapi.dispatchtrack.com/api/v1
paths:
  /oauth2/token:
    post:
      tags:
      - Orders
      summary: Get Oauth2 Access Token  
      description: >
        > Note: The Client ID and Secret aren't included in the POST body, but rather are placed in the HTTP Authorization header following the rules of HTTP Basic Auth.

        ```
          # Header sample

          Authorization: Basic c2FjbGllbnRpZDpzYWNsaWVudHNlY3JldA==

          # base64(clientId + ":" + clientSecret) generates c2FjbGllbnRpZDpzYWNsaWVudHNlY3JldA==
        ```
      security: 
        - GetTokenAuth: []
      requestBody:
        $ref: '#/components/requestBodies/OauthTokenRequest'
      responses:
        200:
          description: Oauth2 Token Fetch Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OauthToken'
        400:
          description: Oauth2 Token Fetch Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OauthTokenError'

  /add-order:
    post:
      tags:
      - Orders
      summary: Add Orders
      security:
        - Auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                service_orders:
                  type: array
                  items:
                    $ref: '#/components/schemas/ImportOrder'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddOrderSuccess'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddOrderError'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UnauthorizedInvalidToken'
                  - $ref: '#/components/schemas/UnauthorizedAccessWithNote'
  
  /delete-order:
    delete:
      tags:
      - Orders
      summary: Delete Orders
      security:
        - Auth: []
      parameters:
      - name: order_number
        in: query
        description: Order Numbers - comma separated list
        required: true
        schema:
          type: string
          example: '100001,100002'
      - name: date
        in: query
        description: Date (mm/dd/yyyy)
        required: false
        schema:
          type: string
          example: '08/03/2020'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteOrderSuccess'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
