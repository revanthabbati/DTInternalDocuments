            Supported formats: JPG, JPEG, PNG, GIF. Maximum file size: 1 MB.
            If both driver_image_url and driver_image_base64 are provided, URL is attempted first;
            if URL fails, Base64 is used as fallback.
          example: 'https://i.pravatar.cc/300?img=15'
        driver_image_base64:
          type: string
          description: |
            Raw Base64-encoded image data (NOT data URI format).
            REQUIRES driver_image_content_type field.
            Data URI format (data:image/...;base64,...) is NOT supported.
            Supported formats: JPG, JPEG, PNG, GIF. Maximum file size: 1 MB (after decoding).
          example: '/9j/4AAQSkZJRgABAQEASABIAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/wAARCAABAAEDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAn/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8QAFQEBAQAAAAAAAAAAAAAAAAAAAAX/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwCwAB//2Q=='
        driver_image_content_type:
          type: string
          description: |
            MIME type of the image. REQUIRED when driver_image_base64 is provided.
            Supported values: image/jpeg, image/jpg, image/png, image/gif
          example: 'image/jpeg'
        driver_image_filename:
          type: string
          description: |
            Optional filename for the uploaded image.
            If not provided, the driver's name will be used as the filename (e.g., "John Doe.jpg").
          example: 'driver_photo.jpg'

