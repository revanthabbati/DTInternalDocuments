          type: array
          items:
            type: object
            properties:
              date:
                type: string
                example: '2024-08-03'
              time_window:
                type: string
                example: '09:00 AM to 11:00 AM'
              rule_name:
                type: string
                example: 'Morning Window'
              time_window_id:
                type: string
                description: Base64 encoded time window identifier
                example: 'eyJyZXF1ZXN0X2RhdGUiOiIyMDI0LTA4LTAzIn0='
              time_window_start:
                type: string
                example: '09:00'
              time_window_end:
                type: string
                example: '11:00'
              capacity_filled_percentage:
                type: number
                format: float
                description: >
                  Returned only when ignore_capacity=true. Represents how full the slot is, rounded to 2 decimals
                  using the same utilization semantics as capacity availability reports.
                example: 82.0
        can_display_more:
          type: boolean
          example: true
        reservation_number:
          type: string
          example: '1234567890'
        address_resolution:
          type: string
          example: 'Address Resolved'
          description: Only present if send_address_resolution is true

    CreateReservationRequest:
      type: object
      required:
        - time_window_id
      properties:
        code:
          type: string
          description: Business code (alternative to code from headers)
        api_key:
          type: string
          description: API key (alternative to api-key from headers)
        reservation_number:
          type: string
          description: Reservation number (required if order_number not provided)
          example: '1234567890'
        order_number:
          type: string
          description: Order number (required if reservation_number not provided)
          example: '100001'
        time_window_id:
          type: string
          description: Base64 encoded time window ID from reservation_choices
          example: 'eyJyZXF1ZXN0X2RhdGUiOiIyMDI0LTA4LTAzIn0='
        customer_name:
          type: string
          example: 'John Doe'
        customer_email:
          type: string
          example: 'john@example.com'
        customer_phone:
          type: string
          example: '+11234567890'
        address_line1:
          type: string
          example: '1156 high street'
        address_line2:
          type: string
          example: 'Suite 100'
        city:
          type: string
          example: 'Santa Cruz'
        state:
          type: string
          example: 'CA'
        zip:
          type: string
          example: '95064'
        account:
          type: string
          example: 'Acc1'
        service_time:
          type: integer
          example: 30
        skill_level:
          type: integer
          example: 1
        pieces:
          type: integer
          example: 5
        cubes:
          type: number
          format: float
          example: 100.5
        override:
          type: string
          description: >
            Whether to override capacity constraints (true/false).
            When true, commit reservation is allowed even if the selected slot is currently at 100% capacity.
          enum: ['true', 'false']
          example: 'false'
        additional_fields:
          type: object
          description: Additional custom fields for the reservation
          additionalProperties:
            type: string
          example:
            store_code: 'STORE001'
            sales_person_email: 'sales@example.com'

    CreateReservationSuccess:
      type: object
      properties:
        message:
          type: string
          example: 'Reservation Ticket created with time window - 08/03/2024 - 09:00 AM to 11:00 AM'
        reservation_number:
          type: string
          example: '1234567890'
        warning:
          type: string
          description: >
            Optional warning message indicating which additional field keys were skipped
            because they are not configured for the business in Admin > Additional Fields > Reservations Tab.
            This field is only present when unconfigured additional field keys are detected in the request.
          example: 'Additional fields custom_field1,custom_field2 have been skipped as they are not configured for your business'

    UpdateReservationRequest:
      type: object
      properties:
        code:
          type: string
          description: Business code (alternative to code from headers)
        api_key:
          type: string
          description: API key (alternative to api-key from headers)
        additional_fields:
          type: object
          description: Additional custom fields to update
          additionalProperties:
            type: string
          example:
            store_code: 'STORE001'
            sales_person_email: 'sales@example.com'

    UpdateReservationSuccess:
      type: object
      properties:
        message:
          type: string
          example: 'Reservation Ticket updated with additional fields'
        reservation_number:
          type: string
          example: '1234567890'
        warning:
          type: string
          description: >
            Optional warning message indicating which additional field keys were skipped
            because they are not configured for the business in Admin > Additional Fields > Reservations Tab.
            This field is only present when unconfigured additional field keys are detected in the request.
          example: 'Additional fields custom_field1,custom_field2 have been skipped as they are not configured for your business'

    ReleaseReservationRequest:
      type: object
      properties:
        code:
          type: string
          description: Business code (alternative to Code header)
        api_key:
          type: string
          description: API key (alternative to Api-Key header)
        reservation_number:
          type: string
          description: Reservation number (required if order_number not provided)
          example: '1234567890'
        order_number:
          type: string
          description: Order number (required if reservation_number not provided)
          example: '100001'
        unschedule:
          type: string
          description: >
            Whether to unschedule the associated order if it is in Scheduled status.
            When true, the order will be unscheduled and its status reset to Ready to Reschedule.
          enum: ['true', 'false']
          example: 'true'

    ReleaseReservationSuccess:
      type: object
      properties:
        message:
          type: string
          example: 'Reservation capacity has been released'
        reservation_number:
          type: string
          description: Comma-separated reservation numbers that were released
          example: '1234567890'
        order_number:
          type: string
          description: Comma-separated order numbers associated with the released reservations
          example: '100001'

    MissingMandatoryFieldsError:
      type: object
      properties:
        message:
          type: string
          example: 'Missing mandatory fields zip'
          description: Lists all missing mandatory fields

    InvalidCubesError:
      type: object
      properties:
        message:
          type: string
          example: 'Cubes should be greater than 0'

    InvalidAccountError:
      type: object
      properties:
        message:
          type: string
          example: 'Invalid Account'

    InvalidServiceTypeError:
      type: object
      properties:
        message:
          type: string
          example: 'Invalid Service Type'

    InvalidReadyToScheduleDateError:
      type: object
      properties:
        message:
          type: string
          example: 'Invalid date format for ready to schedule date.'

    ReservationNotEligibleError:
      type: object
      properties:
        message:
          type: string
          description: >
            Reservation is not eligible for reservation choices. The suffix after "as" varies by reason.
            Possible reason patterns include:
            - associated order's status is <status>
            - order with route status as <Locked|Started|Finished> is not eligible for rescheduling
            - rescheduling is not enabled for business
            - rescheduling time limit reached
          example: 'Reservation number is not eligible for reservation choices as associated order status is Finished'
        reservation_number:
          type: string
          example: '1234567890'

    ResourcesExceedingMaxLimitError:
      type: object
      properties:
        message:
          type: string
          example: 'Number of resources exceeding max limit'
        reservation_number:
          type: string
          example: '1234567890'

    InvalidTimeWindowError:
      type: object
      properties:
        message:
          type: string
          example: 'Invalid time window details were sent in the request'
        reservation_number:
          type: string
          example: '1234567890'

    CapacityUnavailableError:
      type: object
      properties:
        message:
          type: string
          example: 'The time window selected no longer has availability. Please get new reservation choices'
        reservation_number:
          type: string
          example: '1234567890'

    ReservationNotEligibleForReschedulingError:
      type: object
      properties:
        message:
          type: string
          example: 'Reservation with given Reservation number already exists and not eligible for rescheduling as associated order status is Finished'
        reservation_number:
          type: string
          example: '1234567890'

    ReservationNotEligibleForReleaseError:
      type: object
      properties:
        message:
          type: string
          example: 'This reservation is not eligible to be released'
        order_status:
          type: string
          example: 'Finished'
        route_status:
          type: string
          example: 'Started'
        reservation_number:
          type: string
          example: '1234567890'

    ReservationNotFoundError:
      type: object
      properties:
        message:
          type: string
          example: 'Reservation not found.'

    ReservationError:
      type: object
      properties:
        message:
          type: string
          example: 'Please send all mandatory fields'
        reservation_number:
          type: string
          example: '1234567890'

    ApiKeyCodeNotFoundError:
      type: object
      properties:
        message:
          type: string
          example: 'Valid API Key and API Code are required'

    DriversResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        count:
          type: integer
          example: 1
        version:
          type: string
          example: 'v123'
        drivers:
          type: object
          properties:
            driver:
              type: array
              items:
                $ref: '#/components/schemas/DriverResponse'

    DriverResponse:
      type: object
      properties:
        driver_number:
          type: string
          example: 'test t1'
        driver_profile_img_url:
          type: string
          example: 'https://smediadev.dispatchtrack.com/api/v1/image/fDDeY03tzeAwVTCAWuX3ABj8rWbTrnMe7tcHnFLmDHTaVVtE9wMEpc38nPdE%0AXB69c0PWHSSUgJuWpbNJVX9YqvlPS%2F6QQB3m%2FMh46V3e33A%3D%0A'
        name:
          type: string
          example: 'namet1'
        login:
          type: string
          example: 'logint1'
        description:
          type: string
          example: 'MWF driver'
        skill_level:
          type: string
          example: '2'
        efficiency_factor:
          type: string
          example: '1'
        time_zone:
          type: string
          example: 'America/New_York'
        status:
          type: string
          example: '1'
          description: 'Driver status: "1" for active, "0" for inactive'
        pay_group:
          type: string
          example: 'RK'
        work_days:
          type: string
          example: 'M,T,W,H,F,S,U'
        enable_sso:
          type: boolean
          example: true
        license_number:
          type: string
          example: 'ABC1234567'
        license_state:
          type: string
          example: 'CA'
        dot_number:
          type: string
          example: '1234567890'
        contact_number:
          type: string
          example: '1234567890'
        accounts:
          type: object
          properties:
            account:
              type: array
              items:
                type: string
              example: ['A1', '500']

  securitySchemes:
    GetTokenAuth:
      type: http
      scheme: basic
    Auth:
      type: http
      scheme: bearer
    RsApiAuth:
      type: apiKey
      in: header
      name: Api-Key
      description: >
        Reservation API authentication requires both a business `Code` header and an `Api-Key` header.
        These can alternatively be passed as `code` and `api_key` query parameters or in the request body.
        The business must have new reservation enabled to access these endpoints.
