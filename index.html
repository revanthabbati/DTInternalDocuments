<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Documentation Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f46e5', // Indigo 600
                        secondary: '#3b82f6', // Blue 500
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Staggered Fade-in Animation */
        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
        }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 flex flex-col min-h-screen pb-16">

    <header class="sticky top-0 z-30 glass border-b border-slate-200 dark:border-slate-800 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-br from-primary to-secondary text-white p-2.5 rounded-lg shadow-lg">
                    <i class="fa-solid fa-book-open text-xl"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary dark:from-indigo-400 dark:to-blue-400">
                    SOP & API Docs
                </h1>
            </div>
            
            <button id="themeToggle" class="p-2.5 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-primary text-slate-600 dark:text-slate-300">
                <i id="themeIcon" class="fa-solid fa-moon text-lg"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-10 w-full mb-10">
        
        <div class="max-w-3xl mx-auto mb-12 relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fa-solid fa-search text-slate-400 group-focus-within:text-primary transition-colors"></i>
            </div>
            <input type="text" id="searchInput" placeholder="Search for files, SOPs, APIs..." 
                class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 shadow-sm focus:shadow-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all duration-300 text-lg placeholder-slate-400 dark:placeholder-slate-500">
        </div>

        <div id="fileGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

    </main>

    <footer class="fixed bottom-0 w-full glass border-t border-slate-200 dark:border-slate-800 z-30 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center text-sm text-slate-600 dark:text-slate-400">
            <p class="mb-2 md:mb-0">
                &copy; Internal Documents | Developed by <span class="font-semibold text-primary dark:text-indigo-400">Revanth Reddy Abbati</span>
            </p>
            <button onclick="openLoginModal()" class="hover:text-primary dark:hover:text-white transition-colors flex items-center px-3 py-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800">
                <i class="fa-solid fa-shield-halved mr-2"></i> Admin Portal
            </button>
        </div>
    </footer>

    <div id="loginModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-2xl w-96 max-w-[90%] transform scale-95 transition-transform duration-300 border border-slate-200 dark:border-slate-700" id="loginModalContent">
            <div class="text-center mb-6">
                <div class="inline-block bg-primary/10 dark:bg-primary/20 text-primary p-3 rounded-full mb-3">
                    <i class="fa-solid fa-lock text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Admin Login</h2>
                <p class="text-xs text-red-500 mt-2 font-medium bg-red-50 dark:bg-red-900/20 py-1 px-2 rounded">Static site auth is not secure.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
                    <input type="email" id="emailInput" class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-slate-800 dark:text-white transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                    <input type="password" id="passwordInput" class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-slate-800 dark:text-white transition-all">
                </div>
            </div>
            
            <div class="flex justify-end space-x-3 mt-8">
                <button onclick="closeLoginModal()" class="px-5 py-2.5 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors font-medium">Cancel</button>
                <button onclick="attemptLogin()" class="px-5 py-2.5 bg-primary hover:bg-indigo-700 text-white rounded-lg shadow-md shadow-primary/30 transition-all font-medium">Login</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity">
        <div class="bg-white dark:bg-slate-800 p-0 rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col border border-slate-200 dark:border-slate-700 overflow-hidden transform scale-95 transition-transform duration-300" id="adminPanelContent">
            
            <div class="px-8 py-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/50">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Document Visibility</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Manage which files are shown in the public directory.</p>
                </div>
                <button onclick="closeAdminPanel()" class="text-slate-400 hover:text-red-500 transition-colors h-10 w-10 flex items-center justify-center rounded-full hover:bg-red-50 dark:hover:bg-red-900/20">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="overflow-y-auto flex-grow p-4 space-y-2" id="adminFileList">
                </div>
            
            <div class="px-8 py-5 border-t border-slate-200 dark:border-slate-700 flex justify-end bg-slate-50/50 dark:bg-slate-800/50">
                <button onclick="closeAdminPanel()" class="px-6 py-2.5 bg-primary hover:bg-indigo-700 text-white rounded-lg shadow-md shadow-primary/30 transition-all font-medium">Save Changes & Close</button>
            </div>
        </div>
    </div>

    <script>
        // --- THEME TOGGLE LOGIC ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function updateThemeIcon() {
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            updateThemeIcon();
        });

        // Initialize icon on load
        updateThemeIcon();


        // --- 1. FILE DATABASE ---
         const fileDatabase = [
            { name: "DispatchTrackXMLAPI.pdf", title: "XML API Documentation", type: "pdf", description: "Standard operating procedures for XML API." },
			{ name: "JSONApiDocument.pdf", title: "JSON API Documentation", type: "pdf", description: "Documentation for JSON API without OAuth" },
            { name: "SamsungAlertsSOP.pdf", title: "SOP for Samsung Alerts", type: "pdf", description: "SOP for handling Samsung Alerts (TR Events, ASN Errors, File Processing Errors)" },
			{ name: "MFRMAlertsSOP.pdf", title: "SOP for MFRM Alerts", type: "pdf", description: "SOP for handling MFRM EDI Alerts" },
			{ name: "DispatchTrackReservationsAPI.pdf", title: "Reservations API", type: "pdf", description: "Documentation for Reservations API" },
            { name: "Updated-json-API.yaml", title: "Updated JSON API - OAuth", type: "yaml", description: "Updated JSON API Payload architecture and spec." },
			{ name: "RoutingV1toV5Differences.pdf", title: "Routing V1 vs V5", type: "pdf", description: "Routing Version V1 and V5 differences." },
			{ name: "RoutingV1V2V3.pdf", title: "Routing V1 vs V2 vs V3", type: "pdf", description: "Routing Version V1, V2 and V3 differences." }
        ];

        // --- 2. STATE MANAGEMENT ---
        let hiddenFiles = JSON.parse(localStorage.getItem('hiddenFiles')) || [];

        // --- 3. SEARCH CONFIGURATION ---
        const fuseOptions = {
            keys: ['title', 'name', 'description'],
            threshold: 0.3, // Slightly stricter for better exact matches
            ignoreLocation: true
        };
        let fuse = new Fuse(fileDatabase, fuseOptions);

        // --- 4. RENDER FILES ---
        function getIcon(type) {
            const icons = {
                'pdf': '<div class="h-12 w-12 rounded-xl bg-red-50 dark:bg-red-500/10 flex items-center justify-center text-red-500"><i class="fa-solid fa-file-pdf text-2xl"></i></div>',
                'yaml': '<div class="h-12 w-12 rounded-xl bg-purple-50 dark:bg-purple-500/10 flex items-center justify-center text-purple-500"><i class="fa-solid fa-file-code text-2xl"></i></div>',
                'xml': '<div class="h-12 w-12 rounded-xl bg-green-50 dark:bg-green-500/10 flex items-center justify-center text-green-500"><i class="fa-solid fa-file-code text-2xl"></i></div>',
                'json': '<div class="h-12 w-12 rounded-xl bg-yellow-50 dark:bg-yellow-500/10 flex items-center justify-center text-yellow-500"><i class="fa-solid fa-file-lines text-2xl"></i></div>'
            };
            return icons[type] || '<div class="h-12 w-12 rounded-xl bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500"><i class="fa-solid fa-file text-2xl"></i></div>';
        }

        function getFileLink(file) {
            if (file.type === 'yaml') {
                // Generate a robust absolute URL based on where the site is currently hosted
                let baseUrl = window.location.href.split('?')[0].split('#')[0]; // Remove any URL parameters or hashes
                baseUrl = baseUrl.replace(/index\.html$/, ''); // Remove index.html if present
                if (!baseUrl.endsWith('/')) baseUrl += '/'; // Ensure trailing slash
                
                const absoluteFileUrl = `${baseUrl}files/${file.name}`;
                
                // Redirect to Swagger Editor with the absolute URL
                return `https://editor.swagger.io/?url=${encodeURIComponent(absoluteFileUrl)}`;
            }
            return `files/${file.name}`;
        } 

        function renderGrid(filesToRender) {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = '';

            filesToRender.forEach((file, index) => {
                if (hiddenFiles.includes(file.name)) return;

                const card = document.createElement('a');
                card.href = getFileLink(file);
                card.target = "_blank";
                
                // Advanced Card UI with Staggered Animation
                card.className = "bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-xl hover:shadow-primary/5 hover:border-primary/30 dark:hover:border-primary/50 transition-all duration-300 transform hover:-translate-y-1 block group cursor-pointer animate-fade-in";
                card.style.animationDelay = `${index * 0.05}s`; 
                
                card.innerHTML = `
                    <div class="flex items-start space-x-4">
                        <div class="flex-shrink-0 transition-transform duration-300 group-hover:scale-110">${getIcon(file.type)}</div>
                        <div class="flex-grow">
                            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary dark:group-hover:text-indigo-400 transition-colors">${file.title}</h3>
                            <p class="text-xs font-mono text-slate-400 dark:text-slate-500 mt-1 break-all">${file.name}</p>
                            <p class="text-sm text-slate-600 dark:text-slate-400 mt-3 line-clamp-2 leading-relaxed">${file.description}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Empty state
            if(filesToRender.length === 0 || filesToRender.every(f => hiddenFiles.includes(f.name))) {
                 grid.innerHTML = `
                 <div class="col-span-full py-12 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 animate-fade-in">
                    <i class="fa-solid fa-folder-open text-6xl mb-4 opacity-50"></i>
                    <p class="text-lg font-medium">No documents found matching your criteria.</p>
                 </div>`;
            }
        }

        // --- 5. SEARCH LOGIC ---
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value;
            if (query.trim() === '') {
                renderGrid(fileDatabase);
            } else {
                const results = fuse.search(query).map(result => result.item);
                renderGrid(results);
            }
        });

        // --- 6. ADMIN MODAL LOGIC (With smooth scaling animations) ---
        function openLoginModal() {
            const modal = document.getElementById('loginModal');
            const content = document.getElementById('loginModalContent');
            modal.classList.remove('hidden');
            // Trigger reflow for animation
            void modal.offsetWidth; 
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }

        function closeLoginModal() {
            const modal = document.getElementById('loginModal');
            const content = document.getElementById('loginModalContent');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('emailInput').value = '';
                document.getElementById('passwordInput').value = '';
            }, 200); // Wait for transition
        }

        function attemptLogin() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;

            if (email === 'revanth.abbati@dispatchtrack.com' && password === 'Create@32') {
                closeLoginModal();
                setTimeout(openAdminPanel, 250); // Open admin panel after login modal closes
            } else {
                alert("Invalid credentials.");
            }
        }

        // --- 7. ADMIN PANEL LOGIC ---
        function openAdminPanel() {
            const modal = document.getElementById('adminPanel');
            const content = document.getElementById('adminPanelContent');
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
            renderAdminList();
        }

        function closeAdminPanel() {
            const modal = document.getElementById('adminPanel');
            const content = document.getElementById('adminPanelContent');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                const query = document.getElementById('searchInput').value;
                if(query) {
                    renderGrid(fuse.search(query).map(r => r.item));
                } else {
                    renderGrid(fileDatabase);
                }
            }, 200);
        }

        function toggleVisibility(fileName) {
            if (hiddenFiles.includes(fileName)) {
                hiddenFiles = hiddenFiles.filter(name => name !== fileName);
            } else {
                hiddenFiles.push(fileName);
            }
            localStorage.setItem('hiddenFiles', JSON.stringify(hiddenFiles));
            renderAdminList();
        }

        function renderAdminList() {
            const list = document.getElementById('adminFileList');
            list.innerHTML = '';

            fileDatabase.forEach(file => {
                const isHidden = hiddenFiles.includes(file.name);
                const item = document.createElement('div');
                item.className = "flex justify-between items-center p-4 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-xl transition-colors hover:shadow-sm";
                
                item.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="opacity-70">${getIcon(file.type).replace('h-12 w-12', 'h-10 w-10 text-xl')}</div>
                        <div>
                            <h4 class="font-bold text-slate-800 dark:text-slate-200">${file.title}</h4>
                            <p class="text-xs font-mono text-slate-500">${file.name}</p>
                        </div>
                    </div>
                    <button onclick="toggleVisibility('${file.name}')" 
                        class="px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${
                            isHidden 
                            ? 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600' 
                            : 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 hover:bg-green-200 dark:hover:bg-green-900/50 ring-1 ring-green-500/20'
                        }">
                        ${isHidden ? '<i class="fa-solid fa-eye-slash mr-1.5"></i> Hidden' : '<i class="fa-solid fa-eye mr-1.5"></i> Visible'}
                    </button>
                `;
                list.appendChild(item);
            });
        }

        // Initial Render
        renderGrid(fileDatabase);

    </script>
</body>
</html>
